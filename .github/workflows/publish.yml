name: Publish

on:
  push:
    branches:
      - main
    paths:
      - jsr.json

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - name: Publish package
        run: npx jsr publish --allow-slow-types
